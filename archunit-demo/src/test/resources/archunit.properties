# =============================================================================
# ArchUnit global configuration
# Loaded automatically from the classpath by ArchUnit at test runtime.
# Docs: https://www.archunit.org/userguide/html/000_Index.html#_configuration
# =============================================================================

# -----------------------------------------------------------------------------
# FreezingArchRule — violation store
#
# FreezingArchRule stores the set of KNOWN ("frozen") violations in text files.
# Only violations that are NOT in the frozen set cause a test failure.
#
# Typical adoption workflow for legacy codebases:
#   1. Add FreezingArchRule.freeze(...) wrapping the desired rule.
#   2. First run: ArchUnit writes all CURRENT violations to the store files.
#   3. Commit the store files — this is the shared baseline for the whole team.
#   4. Subsequent runs: only NEW violations (not in the store) fail the build.
#   5. Fix frozen violations over time; ArchUnit removes them from the store
#      automatically when they are no longer present in the code.
#
# Store location (relative to the Maven module root directory).
# Commit src/test/resources/archunit_store/ to git so all developers and CI
# share the same frozen-violation baseline.
# -----------------------------------------------------------------------------
freeze.store.default.path=src/test/resources/archunit_store

# Allow creating store files when they do not exist yet.
# Required on the very first run and in fresh CI environments.
freeze.store.default.allowStoreCreation=true

# Allow the store to be updated when violations are fixed or change.
# In CI, consider setting this to false to prevent accidentally "hiding"
# new violations by silently re-freezing them.
freeze.store.default.allowStoreUpdate=true
